name: Go Tests and Build Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Verify Dependencies
        run: go mod verify

      - name: Build Binary
        run: go build -v ./...

      - name: Run Unit Tests
        run: go test -v -race ./...
