name: Publish Release Docker Image

on:
  release:
    types: [published]
  workflow_dispatch: # Allows manual trigger from Actions tab

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go (Stable version)
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Compile ReShell binary
        run: |
          # Dynamically set go.mod version to match the runner's Go compiler version
          RUNNER_GO_VERSION=$(go version | awk '{print $3}' | sed -E 's/go([0-9]+\.[0-9]+).*/\1/')
          go mod edit -go=${RUNNER_GO_VERSION}
          CGO_ENABLED=0 GOOS=linux go build -o reshell .

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=beta
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
